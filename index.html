<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>L&amp;B Call Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

<h1>📞 Our Time Together</h1>

<div class="stats-container">
    <div class="card"><h3>Total Time</h3><p id="totalTime"></p></div>
    <div class="card"><h3>Favorite Day</h3><p id="favoriteDay"></p></div>
    <div class="card"><h3>Average Call</h3><p id="avgCall"></p></div>
    <div class="card"><h3>Longest Call</h3><p id="longestCall"></p></div>
    <div class="card"><h3>Current Streak</h3><p id="streak"></p></div>
    <div class="card"><h3>Total Hours</h3><p id="totalHours"></p></div>
</div>

<canvas id="callsChart"></canvas>

<script src="script.js"></script>
</body>
</html>
